# jobprofil.example.yaml
# Ausfüllen und als jobprofil.yaml speichern. Dient ProfileAgent + (ab Etappe 2) MatchAgent.
# Felder leer lassen = nicht gefiltert.

person:
  name: ""
  standort: "Wolfen, Sachsen-Anhalt, DE"   # Basis für location-Suche
  umkreis_km: 50                            # JobSpy 'distance' (Default 50)

suche:
  jobtitel:                                 # Such-Begriffe (OR), pro Quelle genutzt
    - ""                                    # z.B. "Python Entwickler"
    - ""
  anzeigen_sprache: "de"                    # de / en / beides
  remote: null                              # true / false / null (egal)
  job_type: ""                              # fulltime | parttime | contract | internship | "" (egal)
  hours_old: 168                            # nur Anzeigen der letzten N Stunden (168 = 7 Tage)
  results_wanted: 25                        # Treffer pro Quelle

quellen:                                    # welche Börsen durchsuchen
  indeed: true                              # stabilste Quelle
  google: true                              # SOLL Xing/Jobware mitfangen (Umweg), liefert
                                            # aber aktuell 0: JobSpy-Upstream-Bug #302
                                            # ('initial cursor not found', offen/unfixbar von
                                            # uns). An lassen — greift wieder nach Upstream-Fix.
  linkedin: false                           # rate-limited; bei Bedarf true + ggf. Proxy
  glassdoor: false

# --- Optionale Zusatz-Quelle: service.bund.de (öffentlicher Dienst, TVöD/Kommunen/
#     Bundeswehr/Stadtwerke — Indeed deckt das schlecht ab). RSS, gratis, login-frei,
#     aggregiert interamt mit. Aktiv NUR wenn feed_url gesetzt ist (sonst ignoriert).
# quellen_extra:
#   servicebund:
#     # Gefilterte Such-RSS-URL: auf service.bund.de eine Suche bauen und unten
#     # "Suchergebnis als RSS-Feed" kopieren. TIPP (gemessen 2026-06-29): templateQueryString
#     # LEER lassen + resultsPerPage=100 -> service.bund liefert die ganze regionale ÖD-Liste,
#     # die titel_keywords unten sieben sie client-seitig (bessere Abdeckung als ein enger
#     # Suchbegriff wie "handwerk", der real nur ~1 Technik-Stelle traf).
#     feed_url: "https://service.bund.de/Content/DE/Stellen/Suche/Formular.html?nn=4642046&ambit_distance=30&type=0&cl2Addresses_Adresse_State=hessen&resultsPerPage=100&sortOrder=dateOfIssue_dt+desc&city_zipcode=Obertshausen+%28Hessen%29&jobsrss=true"
#     max_alter_tage: 90        # Karteileichen-Filter (Feed enthält alte Anzeigen); null = aus
#     titel_keywords:           # nur diese Titel weiterverfolgen (leer = alle); sieben den ÖD-Wust
#       - "mechaniker"
#       - "mechatronik"
#       - "elektr"
#       - "instandhalt"
#       - "anlagenmechan"
#       - "mess"
#       - "regeltechnik"
#       - "haustechnik"
#       - "versorgungstechnik"
#       - "schlosser"
#       - "monteur"
#       - "metall"
#       - "schwei"
#     detail_fetch: false       # Default AUS: Volltext-Nachladen kostet ~30s/Stelle (robots Crawl-delay)
#                               # und kann lange blockieren. true nur, wenn du Aufgaben/Profil-Volltext
#                               # für jdparser/tailoring brauchst (dann via max_detail deckeln).
#     max_detail: 25            # Obergrenze Detail-Fetches (greift nur bei detail_fetch: true)

# --- Ab Etappe 2 (Matching), jetzt nur sammeln, noch nicht aktiv ---
profil_fuer_matching:
  skills_muss:                              # K.o.-Kriterien
    - ""
  skills_kann:                              # Bonus
    - ""
  gehalt_min_eur_jahr: null                 # null = egal
  ausschluss_keywords:                      # Anzeigen mit diesen Wörtern abwerten/filtern
    - ""
